name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  upload-asset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Upload script as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" claude-profiles --clobber
